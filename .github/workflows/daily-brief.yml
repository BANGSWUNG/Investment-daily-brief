name: 📋 투자 데일리 브리프

on:
  schedule:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # UTC 00:00 = KST 09:00
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 서머타임(3~11월): 미장 마감 후 4시간
    # 겨울(11~3월): 미장 마감 후 3시간
    # 기상(08:30) 후 30분, 업무(09:30) 전 확인 가능
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - cron: "0 0 * * 1-5"    # 월~금만 실행
  workflow_dispatch:           # 수동 실행도 가능

jobs:
  daily-brief:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 설정 ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 패키지 설치 ──
      - name: Install dependencies
        run: pip install yfinance openpyxl pandas requests

      # ── 4. 통합 보고서 생성 ──
      #    market_heat_report.py → gdelt_daily_report.py → 통합 마크다운
      - name: Generate unified report
        run: python unified_report.py --output ./reports

      # ── 5. 이메일 발송 ──
      - name: Send email
        if: ${{ secrets.EMAIL_TO != '' }}
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          DATE=$(date +%Y-%m-%d)
          
          # Excel 첨부 파일 찾기
          EXCEL_FILE=$(find ./reports -name "market_heat_${DATE}.xlsx" -o -name "market_heat_*.xlsx" | sort -r | head -1)
          
          # 통합 마크다운 찾기
          MD_FILE=$(find ./reports -name "daily_brief_${DATE}.md" -o -name "daily_brief_*.md" | sort -r | head -1)
          
          if [ -n "$MD_FILE" ]; then
            ATTACH_ARG=""
            if [ -n "$EXCEL_FILE" ]; then
              ATTACH_ARG="--attachments $EXCEL_FILE"
            fi
            python send_email.py --md "$MD_FILE" $ATTACH_ARG
          else
            echo "⚠ 통합 마크다운 파일을 찾을 수 없습니다."
          fi

      # ── 6. 보고서 커밋 ──
      - name: Commit reports
        run: |
          git config user.name "Daily Brief Bot"
          git config user.email "bot@daily-brief.local"
          git add reports/
          git diff --staged --quiet || git commit -m "📋 Daily Brief: $(date +%Y-%m-%d)"
          git push
